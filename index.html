<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F8F7F4;--sf:#FFF;--s2:#F5F3EF;--s3:#EDEBE6;--bd:#E8E6E0;--bh:#D4D0C8;--tx:#1a1a1a;--tm:#777;--td:#aaa;--nv:#13294B;--or:#E8720C;--od:#FFF4E8;--ig:#6366F1;--id:#EEF2FF;--tl:#059669;--td2:#ECFDF5;--pu:#7C3AED;--pd:#F5F3FF;--r:12px;--rs:8px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
input,button{font-family:inherit}
::selection{background:var(--od);color:var(--or)}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.7}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .25s ease}
.ctn{max-width:860px;margin:0 auto;padding:0 24px}
@media(max-width:640px){.ctn{padding:0 16px}}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:32px;position:sticky;top:0;z-index:100;background:rgba(248,247,244,.92);backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:10px}
.bm{width:28px;height:28px;background:var(--nv);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:9px;letter-spacing:.5px}
.bn{font-size:14px;font-weight:600;color:var(--tx);letter-spacing:-.2px}
.bai{display:inline-flex;align-items:center;gap:4px;margin-left:6px;font-size:10px;font-weight:500;color:var(--ig);background:var(--id);padding:2px 8px;border-radius:10px}
.bai::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ig);animation:breathe 2.5s ease infinite}
.nst{display:flex;gap:12px;font-size:11px;color:var(--td);font-family:'JetBrains Mono',monospace}
.nst b{color:#888}
@media(max-width:700px){.nst{display:none}}
.hero{text-align:center;padding:20px 0 28px}
.hero h1{font-size:24px;font-weight:300;color:var(--tx);letter-spacing:-.5px;margin-bottom:18px}
.hero h1 strong{font-weight:700}
.sw{max-width:640px;margin:0 auto;position:relative}
.si{width:100%;padding:15px 20px;padding-right:90px;font-size:15px;color:var(--tx);background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;outline:none;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.03)}
.si:focus{border-color:var(--ig);box-shadow:0 2px 20px rgba(99,102,241,.08)}
.si::placeholder{color:#c0bdb5}
.sb{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:10px 18px;border-radius:10px;border:none;background:var(--tx);color:#fff;font-weight:600;font-size:12px;cursor:pointer;transition:background .15s}
.sb:hover{background:#333}
.sh{margin-top:8px;font-size:11px;color:#bbb}
.sh kbd{background:var(--s2);border:1px solid var(--s3);border-radius:3px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:10px}
.sec{margin-bottom:28px}
.sl{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--s3)}
.wfg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:700px){.wfg{grid-template-columns:repeat(2,1fr)}}
.wfc{padding:14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .15s}
.wfc:hover{border-color:var(--bh);box-shadow:0 2px 12px rgba(0,0,0,.04);transform:translateY(-1px)}
.wfi{font-size:16px;margin-bottom:6px}
.wfn{font-size:13px;font-weight:600;color:var(--tx)}
.wfs{font-size:11px;color:#999;margin-top:2px}
.sg{display:flex;gap:8px}
@media(max-width:700px){.sg{flex-wrap:wrap}.sgc{min-width:calc(33% - 6px)}}
.sgc{flex:1;padding:12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer;transition:all .15s}
.sgc:hover{border-color:var(--ig);background:#FAFAFE}
.sgn{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--tx)}
.sgl{font-size:10px;color:#999;font-weight:500;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.aib{padding:20px 24px;background:#FAFAFE;border:1px solid #E8E6F0;border-radius:16px;margin-bottom:20px;position:relative;overflow:hidden}
.aib::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(99,102,241,.06) 0%,transparent 70%);pointer-events:none}
.ait{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.aig{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:var(--ig);text-transform:uppercase;letter-spacing:1px}
.aig::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ig);animation:breathe 2s ease infinite}
.cpb{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:#fff;color:#999;font-size:10px;font-weight:500;cursor:pointer;transition:all .15s}
.cpb:hover{border-color:#ccc;color:#666}
.aix{font-size:14px;line-height:1.8;color:#444;white-space:pre-wrap;position:relative;z-index:1}
.aix strong{color:var(--tx);font-weight:600}
.ald{color:var(--td);font-size:14px}
.hc{padding:20px 24px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;margin-bottom:12px;border-left:3px solid var(--or)}
.hcr{display:flex;justify-content:space-between;align-items:flex-start}
.hcn{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.hcc{font-size:11px;color:#999;font-weight:500;margin-top:2px}
.hct{padding:4px 12px;font-size:10px;font-weight:600;background:var(--tx);color:#fff;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.hcd{font-size:13px;color:#666;line-height:1.65;margin-top:12px}
.htg{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.htg span{font-size:10px;padding:4px 10px;font-weight:500;background:var(--s2);color:#666;border-radius:6px}
.htg span:first-child{background:var(--nv);color:#fff}
.cd{padding:14px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);transition:all .15s;margin-bottom:8px}
.cd.ck{cursor:pointer}
.cd.ck:hover{border-color:var(--bh);box-shadow:0 1px 8px rgba(0,0,0,.03)}
.cr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ct{font-size:13px;font-weight:600;color:var(--tx)}
.tg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.to{background:var(--od);color:var(--or)}
.tb{background:var(--id);color:var(--ig)}
.tt{background:var(--td2);color:var(--tl)}
.tp{background:var(--pd);color:var(--pu)}
.cb{font-size:12px;color:var(--tm);line-height:1.6}
.cm{font-size:11px;color:var(--td);margin-top:6px}
.ce{font-size:11px;color:var(--tl);margin-top:8px;padding:6px 10px;background:var(--td2);border-radius:6px;display:flex;align-items:center;gap:4px}
.ce::before{content:'';width:4px;height:4px;border-radius:1px;background:var(--tl)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}}
.pr{font-size:12px;font-weight:600;color:var(--nv)}
.pw{font-size:11px;color:var(--tm);margin-top:4px;line-height:1.45}
.pa{font-size:10px;color:var(--or);font-weight:600;margin-top:6px}
.eb{padding:14px 20px;background:var(--s2);border-radius:14px;border-left:3px solid var(--nv);font-size:13px;color:#555;line-height:1.6}
.eb strong{color:var(--tx)}
.cw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);margin-bottom:12px}
.ctb{width:100%;border-collapse:collapse;font-size:12px}
.ctb th{padding:10px 8px;font-size:11px;font-weight:600;color:var(--tm);border-bottom:1px solid var(--bd);text-align:center;background:var(--s2)}
.ctb th:first-child{text-align:left}
.ctb td{padding:8px;text-align:center;border-bottom:1px solid var(--s2)}
.ctb td:first-child{text-align:left;font-weight:500;color:var(--tx)}
.cll{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:var(--td2);color:var(--tl)}
.cls{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;background:var(--od);color:var(--or)}
.clw{color:var(--td);font-size:10px}
.cln{color:var(--s3)}
.ceg{padding:12px 16px;background:var(--id);border-radius:0 0 var(--r) var(--r);font-size:12px;color:var(--ig);font-weight:500}
.qb{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.qt{font-size:13px;color:var(--td)}
.qt em{color:var(--tx);font-style:normal;font-weight:500}
.clr{padding:4px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--sf);color:var(--tm);font-size:11px;cursor:pointer;font-weight:500}

.bfh{padding:24px;border-radius:16px;background:var(--sf);border:2px solid var(--or);margin-bottom:20px}
.bfc{font-size:22px;font-weight:700;color:var(--nv)}
.bfs{font-size:13px;color:var(--tm);margin-top:4px}
.bfr{font-size:13px;color:var(--tx);line-height:1.6;margin-top:10px}
.sko{max-width:640px;margin:0 auto;padding:32px 0}
.skt{font-size:18px;font-weight:700;color:var(--nv);margin-bottom:8px}
.skp{font-size:13px;color:var(--tm);margin-bottom:20px;line-height:1.6}
.skr{display:flex;gap:8px}
.ski{flex:1;padding:12px 16px;border-radius:var(--rs);border:2px solid var(--or);background:var(--sf);color:var(--tx);font-size:14px;outline:none}
.skg{padding:12px 24px;border-radius:var(--rs);border:none;background:var(--or);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.skb{margin-top:12px;background:none;border:none;color:var(--td);font-size:12px;cursor:pointer}

.kc{padding:32px;border-radius:16px;background:var(--sf);border:1px solid var(--bd);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.ktl{font-size:16px;font-weight:700;color:var(--nv);margin-bottom:4px}
.kds{font-size:13px;color:var(--tm);margin-bottom:20px}
.kin{width:100%;padding:12px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:12px;text-align:center}
.kin:focus{border-color:var(--or)}
.kbn{width:100%;padding:12px;border-radius:var(--rs);border:none;background:var(--nv);color:#fff;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:8px}
.kbn:hover{background:#1E3A5F}
.ksk{background:none;border:none;color:var(--td);font-size:12px;cursor:pointer;text-decoration:underline}
.knt{font-size:10px;color:var(--td);margin-top:16px;line-height:1.5}
.cxr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cxc{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);color:#666;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.cxc:hover{border-color:var(--ig);color:var(--ig);background:#FAFAFE}
.ft{text-align:center;padding:32px 0;font-size:10px;color:var(--td);border-top:1px solid var(--bd);margin-top:40px}
</style>
</head>

ers, investors, portfolio managers","delivery":"API, web-based access, Encompass integration","url":"https://mortgagetech.ice.com/solutions/data"},{"name":"ICE Home Price Index (HPI)","sheet":"Mortgage Analytics","cat":"Property Valuation / Market Intelligence","desc":"One of the most complete and reliable measures of residential real estate price trends in the U.S. Covers 95% of U.S. residential properties down to ZIP-code level.","cap":"National, state, metro, county, and ZIP-level home price data; 95% property coverage; monthly updates; annual growth rates; single-family vs. condo breakouts","users":"Investors, lenders, servicers, researchers, policymakers, media","delivery":"API, bulk data, reports, RAP platform","url":"https://www.ice.com/fixed-income-data-services/mortgage-data-solutions"},{"name":"ICE Collateral Analytics","sheet":"Mortgage Analytics","cat":"Property Valuation","desc":"Leverages robust analytics, an industry-leading AVM, local market data, neighborhood trends and key collateral metrics to objectively evaluate appraisal valuations.","cap":"Appraisal review/evaluation; AVM capabilities; for-sale listing alerts; enhanced public records data; comprehensive valuations in one platform","users":"Lenders, servicers, appraisers, compliance teams","delivery":"Web-based platform, API","url":"https://www.icemortgagetechnology.com/products"},{"name":"ICE MBS Evaluated Pricing","sheet":"Mortgage Analytics","cat":"Fixed Income Pricing","desc":"Evaluated pricing across the full spectrum of mortgage-backed securities including agency pass-throughs, CMOs, ABS, and CMBS.","cap":"1M+ agency pass-through issues (FHLMC, FNMA, GNMA, SBA); 200K+ CMOs; ~17K ABS; 11K CMBS; continuous and end-of-day pricing","users":"Fixed income traders, portfolio managers, risk managers, accounting teams","delivery":"ICE Data Services feeds, API","url":"https://www.ice.com/fixed-income-data-services/mortgage-data-solutions"},{"name":"ICE MBS LTV & Tappable Equity Analytics","sheet":" var ADJ=[{"anchor":"McDash","rec":"AFT Prepayment & Credit Model","type":"Data \u2192 Model","rationale":"McDash is the primary input dataset for AFT. Clients using raw loan data get far more value when they layer on ICE's prepayment/default models that are calibrated specifically on that data.","segFit":"Asset Mgrs, Banks, HFs","edge":"Same underlying loan universe \u2014 model is trained on the data you already license"},{"anchor":"McDash","rec":"ICE Climate Risk for Mortgages","type":"Data + Data overlay","rationale":"You're already analyzing loan performance \u2014 now overlay climate risk at the property level to see how insurance costs, flood/wildfire exposure, and affordability pressures affect future defaults.","segFit":"Banks, Insurance, Asset Mgrs","edge":"Climate data mapped directly to McDash loan IDs at property level"},{"anchor":"McDash","rec":"ICE Home Price Index (HPI)","type":"Data + Index","rationale":"Loan-level data shows what happened. HPI shows where home values are heading next \u2014 critical for LTV projections, equity analysis, and geographic risk allocation.","segFit":"All segments","edge":"HPI integrates natively with McDash for ZIP-level LTV and tappable equity analytics"},{"anchor":"McDash","rec":"Rapid Analytics Platform (RAP)","type":"Data \u2192 Platform upgrade","rationale":"You license the data \u2014 but are you getting full value? RAP lets you query McDash + HPI + eMBS + public records in a single cloud environment with ML tooling. Unlocks custom research that's impossible with flat files.","segFit":"Asset Mgrs, HFs, Banks","edge":"Single environment access to all ICE mortgage datasets with no ETL needed"},{"anchor":"ICE eMBS","rec":"ICE MBS Evaluated Pricing","type":"Data + Valuation","rationale":"You have the disclosure data. Now get independent evaluated prices on 1M+ agency pools for NAV, regulatory reporting, and fair value. Priced by the same team that knows the data.","segFit":"Asset Mgrs, Banks, Insurance","edge":"Evaluated prices built using the same pool/tranche data from eMBS"},{"anchor":"ICE eMBS","rec":"ICE Bonds / TMC (MBS Trading)","type":"Data \u2192 Execution","rationale":"You're analyzing MBS pools with eMBS data. Execute trades on those same securities via ICE TMC with Click-to-Trade and RFQ \u2014 analytics and execution on one platform.","segFit":"Asset Mgrs, HFs, Broker-Dealers","edge":"Plans to integrate IMT pricing/analytics directly into TMC trading screen"},{"anchor":"AFT Prepayment Model","rec":"ICE Portfolio Risk Analytics (BondEdge)","type":"Model \u2192 Portfolio tool","rationale":"You're modeling prepayment and credit at the loan level. BondEdge lets you aggregate that up to portfolio-level risk analytics with benchmarking, cash flow analysis, and ALM.","segFit":"Asset Mgrs, Banks, Insurance","edge":"AFT models feed directly into BondEdge cashflow projections"},{"anchor":"AFT Prepayment Model","rec":"ICE Mortgage Rate Lock Indices","type":"Model + Market signal","rationale":"Your prepayment model is only as good as your rate inputs. Rate Lock Indices give you the primary market rate signal from ~50% of origination \u2014 earlier and more granular than secondary market rates.","segFit":"Asset Mgrs, HFs, Banks","edge":"Rate lock data from ICE Mortgage Technology feeds directly into rate-driven model scenarios"},{"anchor":"ICE AVMs","rec":"ICE Portfolio Monitoring (Collateral Alert)","type":"Point-in-time \u2192 Ongoing","rationale":"You valued the collateral at origination. But values change. Collateral Alert gives you continuous monitoring of property/borrower events so you're not flying blind between valuations.","segFit":"Banks, Insurance, IMBs","edge":"Same property data feeds both AVM and alert triggers"},{"anchor":"ICE AVMs","rec":"ICE Climate Risk for Mortgages","type":"Valuation + Risk overlay","rationale":"Traditional AVMs don't factor in rising insurance costs or climate-driven affordability pressure. Climate data shows you the hidden risks that could
