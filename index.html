<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ICE Sales Intelligence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--s2:#F5F3EF;--s3:#EDEBE6;
  --border:#E5E2DB;--bh:#D4D0C8;
  --text:#1A1A18;--tm:#6B6960;--td:#9C9A92;
  --navy:#13294B;--navyLight:#1E3A5F;
  --orange:#E8720C;--orangeLight:#F5A623;--orangeDim:#FFF4E8;
  --blue:#2563EB;--blueDim:#EFF6FF;--blueText:#1E40AF;
  --teal:#059669;--tealDim:#ECFDF5;--tealText:#065F46;
  --purple:#7C3AED;--purpleDim:#F5F3FF;--purpleText:#5B21B6;
  --coral:#DC2626;--coralDim:#FEF2F2;
  --green:#16A34A;--greenDim:#F0FDF4;
  --radius:12px;--radiusSm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input,button,textarea{font-family:inherit}
::selection{background:var(--orangeDim);color:var(--orange)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.fade-in{animation:fadeIn .3s ease}

/* Layout */
.container{max-width:880px;margin:0 auto;padding:0 24px}
@media(max-width:640px){.container{padding:0 16px}}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(255,255,255,.92)}
.header-inner{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:28px;height:28px;border-radius:6px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:9px;letter-spacing:.5px}
.brand-name{font-size:14px;font-weight:700;color:var(--navy)}
.brand-sub{font-size:9px;font-weight:600;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase}
.header-stats{display:flex;gap:16px;font-size:11px;color:var(--td)}
.header-stats b{color:var(--tm);font-weight:600}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.status-on{background:var(--green)}
.status-off{background:var(--td)}

/* Hero search */
.hero{padding:40px 0 32px;text-align:center}
.hero h1{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px}
.hero p{font-size:13px;color:var(--tm);margin-bottom:24px}
.search-wrap{position:relative;max-width:680px;margin:0 auto}
.search-input{width:100%;padding:14px 48px 14px 18px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;outline:none;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.search-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,114,12,.1)}
.search-input::placeholder{color:var(--td)}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:8px 16px;border-radius:var(--radiusSm);border:none;background:var(--orange);color:#fff;font-weight:600;font-size:12px;cursor:pointer;transition:background .15s}
.search-btn:hover{background:#D4660B}
.search-hint{margin-top:8px;font-size:11px;color:var(--td)}
.search-hint kbd{background:var(--s2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:10px}

/* Skills bar */
.skills-bar{padding:0 0 28px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.skills-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.skill-chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.skill-chip:hover{border-color:var(--orange);color:var(--orange);background:var(--orangeDim)}
.skill-chip .sk-icon{font-size:14px}
.skill-active{border-color:var(--orange);color:var(--orange);background:var(--orangeDim)}

/* Context skills (adaptive) */
.ctx-skills{margin-bottom:20px}
.ctx-label{font-size:10px;font-weight:600;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.ctx-row{display:flex;gap:6px;flex-wrap:wrap}
.ctx-chip{padding:6px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--tm);font-size:11px;cursor:pointer;transition:all .15s}
.ctx-chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blueDim)}

/* Suggestions grid */
.suggest-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:680px;margin:0 auto}
@media(max-width:640px){.suggest-grid{grid-template-columns:1fr}}
.suggest-card{padding:10px 14px;border-radius:var(--radiusSm);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-size:12px;color:var(--tm);text-align:left}
.suggest-card:hover{border-color:var(--bh);background:var(--s2);color:var(--text)}

/* AI Response */
.ai-box{margin-bottom:24px;padding:20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);position:relative}
.ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ai-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:1px}
.ai-badge .status-dot{background:var(--orange);animation:pulse 2s infinite}
.ai-copy{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--tm);font-size:10px;cursor:pointer;font-weight:500;transition:all .15s}
.ai-copy:hover{border-color:var(--bh);color:var(--text)}
.ai-text{font-size:14px;color:var(--text);line-height:1.75;white-space:pre-wrap}
.ai-loading{color:var(--td);font-size:14px}
.ai-local{font-size:12px;color:var(--td);font-style:italic}

/* Result sections */
.result-section{margin-bottom:24px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.section-dot{width:8px;height:8px;border-radius:50%}
.section-title{font-size:12px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.5px}
.section-count{font-size:11px;color:var(--td)}

/* Cards */
.result-card{padding:14px 16px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);transition:all .15s;margin-bottom:8px}
.result-card.clickable{cursor:pointer}
.result-card.clickable:hover{border-color:var(--bh);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.tag-orange{background:var(--orangeDim);color:var(--orange)}
.tag-blue{background:var(--blueDim);color:var(--blueText)}
.tag-teal{background:var(--tealDim);color:var(--tealText)}
.tag-purple{background:var(--purpleDim);color:var(--purpleText)}
.card-body{font-size:12px;color:var(--tm);line-height:1.6}
.card-meta{font-size:11px;color:var(--td);margin-top:6px}
.card-edge{font-size:11px;color:var(--tealText);margin-top:8px;padding:6px 10px;background:var(--tealDim);border-radius:6px}
.field-name{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}

/* Hero card (primary result) */
.hero-card{padding:20px;border-radius:var(--radius);background:var(--surface);border:2px solid var(--orange);margin-bottom:16px}
.hero-card .card-title{font-size:16px;font-weight:700}

/* Competitive table */
.comp-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
.comp-table{width:100%;border-collapse:collapse;font-size:12px}
.comp-table th{padding:10px 8px;font-size:11px;font-weight:600;color:var(--tm);border-bottom:1px solid var(--border);text-align:center;background:var(--s2)}
.comp-table th:first-child{text-align:left}
.comp-table td{padding:8px;text-align:center;border-bottom:1px solid var(--s2)}
.comp-table td:first-child{text-align:left;font-weight:500;color:var(--text)}
.comp-leader{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--tealDim);color:var(--tealText);font-weight:600}
.comp-strong{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--orangeDim);color:var(--orange);font-weight:500}
.comp-limited{font-size:10px;color:var(--td)}
.comp-dash{color:var(--border)}
.comp-edge{padding:12px 16px;background:var(--blueDim);border-radius:0 0 var(--radius) var(--radius);font-size:12px;color:var(--blueText);font-weight:500}

/* Skill input overlay */
.skill-overlay{max-width:680px;margin:0 auto;padding:32px 0}
.skill-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px}
.skill-prompt{font-size:13px;color:var(--tm);margin-bottom:20px;line-height:1.6}
.skill-input-row{display:flex;gap:8px}
.skill-input{flex:1;padding:12px 16px;border-radius:var(--radiusSm);border:2px solid var(--orange);background:var(--surface);color:var(--text);font-size:14px;outline:none}
.skill-go{padding:12px 24px;border-radius:var(--radiusSm);border:none;background:var(--orange);color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.skill-back{margin-top:12px;background:none;border:none;color:var(--td);font-size:12px;cursor:pointer}

/* Key setup */
.key-page{max-width:420px;margin:80px auto;text-align:center;padding:0 24px}
.key-card{padding:32px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.06)}
.key-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.key-desc{font-size:13px;color:var(--tm);margin-bottom:20px}
.key-input{width:100%;padding:12px;border-radius:var(--radiusSm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:12px;text-align:center}
.key-input:focus{border-color:var(--orange)}
.key-btn{width:100%;padding:12px;border-radius:var(--radiusSm);border:none;background:var(--navy);color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:background .15s;margin-bottom:8px}
.key-btn:hover{background:var(--navyLight)}
.key-skip{background:none;border:none;color:var(--td);font-size:12px;cursor:pointer;text-decoration:underline}
.key-note{font-size:10px;color:var(--td);margin-top:16px;line-height:1.5}

/* Query bar (results mode) */
.query-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.query-text{font-size:13px;color:var(--td)}
.query-text em{color:var(--text);font-style:normal;font-weight:500}
.clear-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--tm);font-size:11px;cursor:pointer;font-weight:500}
.clear-btn:hover{border-color:var(--bh)}

/* Footer */
.footer{text-align:center;padding:32px 0;font-size:10px;color:var(--td);border-top:1px solid var(--border);margin-top:40px}
</style>
</head>

var ADJ=[{"anchor": "McDash", "rec": "AFT Prepayment & Credit Model", "type": "Data \u2192 Model", "rationale": "McDash is the primary input dataset for AFT. Clients using raw loan data get far more value when they layer on ICE's prepayment/default models that are calibrated specifically on that data.", "segFit": "Asset Mgrs, Banks, HFs", "edge": "Same underlying loan universe \u2014 model is trained on the data you already license"}, {"anchor": "McDash", "rec": "ICE Climate Risk for Mortgages", "type": "Data + Data overlay", "rationale": "You're already analyzing loan performance \u2014 now overlay climate risk at the property level to see how insurance costs, flood/wildfire exposure, and affordability pressures affect future defaults.", "segFit": "Banks, Insurance, Asset Mgrs", "edge": "Climate data mapped directly to McDash loan IDs at property level"}, {"anchor": "McDash", "rec": "ICE Home Price Index (HPI)", "type": "Data + Index", "rationale": "Loan-level data shows what happened. HPI shows where home values are heading next \u2014 critical for LTV projections, equity analysis, and geographic risk allocation.", "segFit": "All segments", "edge": "HPI integrates natively with McDash for ZIP-level LTV and tappable equity analytics"}, {"anchor": "McDash", "rec": "Rapid Analytics Platform (RAP)", "type": "Data \u2192 Platform upgrade", "rationale": "You license the data \u2014 but are you getting full value? RAP lets you query McDash + HPI + eMBS + public records in a single cloud environment with ML tooling. Unlocks custom research that's impossible with flat files.", "segFit": "Asset Mgrs, HFs, Banks", "edge": "Single environment access to all ICE mortgage datasets with no ETL needed"}, {"anchor": "ICE eMBS", "rec": "ICE MBS Evaluated Pricing", "type": "Data + Valuation", "rationale": "You have the disclosure data. Now get independent evaluated prices on 1M+ agency pools for NAV, regulatory reporting, and fair value. Priced by the same team that knows the data.", ising insurance costs or climate-driven affordability pressure. Climate data shows you the hidden risks that could erode property values in exposed geographies.", "segFit": "Banks, Insurance, IMBs", "edge": "Climate risk mapped to same properties as AVM coverage (99.9% of U.S.)"}, {"anchor": "ICE Home Price Index", "rec": "ICE MBS LTV & Tappable Equity", "type": "Index \u2192 Security-level analytics", "rationale": "HPI tells you where prices are going. LTV & Tappable Equity translates that into actionable MBS intelligence \u2014 which pools have equity cushions vs. which are underwater.", "segFit": "Asset Mgrs, HFs, Banks", "edge": "ZIP-level HPI feeds directly into security-level LTV calculations"}, {"anchor": "Encompass LOS", "rec": "ICE PPE (Product & Pricing Engine)", "type": "Platform + Pricing", "rationale": "You originate loans in Encompass. PPE gives your LOs instant pricing across hundreds of investor programs with lock automation \u2014 no toggling between systems.", "segFit": "Banks, IMBs", "edge": "Native Encompass integration \u2014 single workflow, no context switching"}, {"anchor": "Encompass LOS", "rec": "ICE Mortgage Analyzers", "type": "Platform + Automation", "rationale": "You're processing loans in Encompass but still staring at documents manually. Mortgage Analyzers automate document review and flag only exceptions \u2014 massive time savings per loan.", "segFit": "Banks, IMBs", "edge": "Reads directly from Encompass loan data; results write back into the same loan file"}, {"anchor": "Encompass LOS", "rec": "Encompass Investor Connect", "type": "Platform \u2192 Secondary mkt", "rationale": "You originate loans \u2014 now sell them. Investor Connect delivers complete loans to investors and GSEs directly from your system of record. Faster funding, fewer touches.", "segFit": "Banks, IMBs", "edge": "Loan data flows directly from Encompass to investor without rekeying"}, {"anchor": "Encompass LOS", "rec": "Simplifile & eClose", "type": "Platform \u2192 Settlement", "rationale": "Close the loop on your digital mortgage. eClose + Simplifile eRecording means no paper handoffs from origination through county recording.", "segFit": "Banks, IMBs", "edge": "Integrated closing workflow within Encompass \u2014 ordering, signing, recording in one flow"}, {"anchor": "MSP Servicing", "rec": "McDash", "type": "System \u2192 Market data", "rationale": "You service loans on MSP. McDash puts your portfolio in the context of the entire market \u2014 benchmark your delinquency rates, prepayment speeds, and loss severity against the industry.", "segFit": "Banks, IMBs", "edge": "MSP data feeds into McDash; same data taxonomy and loan identifiers"}, {"anchor": "MSP Servicing", "rec": "ICE Business Intelligence", "type": "System \u2192 Reporting", "rationale": "You have 14,000+ data elements in MSP. BI turns that into dashboards, KPIs, and actionable insights without pulling reports manually or building custom extracts.", "segFit": "Banks, IMBs", "edge": "BI layer sits directly on MSP data warehouse (Passport)"}, {"anchor": "ICE Climate Physical Risk", "rec": "ICE Climate Transition Risk", "type": "Physical + Transition = Full picture", "rationale": "You're assessing flood/wildfire/hurricane exposure. But regulators and LPs also want emissions data and net-zero alignment. The full suite gives you a complete climate story for reporting.", "segFit": "Asset Mgrs, Banks, Insurance", "edge": "Same geospatial platform powers both; consistent methodology across physical + transition"}, {"anchor": "ICE Climate Physical Risk", "rec": "ICE Sustainable FI Indices", "type": "Risk data \u2192 Benchmark", "rationale": "You measure the risk. Now benchmark against it. ESG-integrated indices let you construct portfolios that systematically avoid the exposures your climate data is flagging.", "segFit": "Asset Mgrs, Insurance", "edge": "Indices incorporate the same climate data you're licensing for analysis"}, {"anchor": "ICE Bonds / TMC", "rec": "ICE FI Liquidity & TCA Data", "type": "Execution + Analytics", "rationale": "You're trading on ICE TMC. TCA data tells you whether you're getting best execution \u2014 critical for MiFID II, SEC compliance, and optimizing your execution strategy.", "segFit": "Asset Mgrs, Broker-Dealers", "edge": "TCA metrics derived from the same execution venue you trade on"}, {"anchor": "ICE Origination Data", "rec": "ICE Mortgage Rate Lock Indices", "type": "Loan data + Market signal", "rationale": "You're tracking origination trends with loan data. Rate lock indices show you the real-time pulse of where rates are being locked \u2014 the leading indicator of the origination data you'll see next month.", "segFit": "HFs, Banks, IMBs", "edge": "Both derived from the same ICE Mortgage Technology platform (~50% of U.S. origination)"}, {"anchor": "ICE MBS Evaluated Pricing", "rec": "ICE Fixed Income Indices (Securitized)", "type": "Pricing + Benchmarking", "rationale": "You're pricing individual securities. ICE indices let you measure portfolio performance against standardized benchmarks \u2014 using the same evaluated prices you already trust.", "segFit": "Asset Mgrs, Insurance, Banks", "edge": "Indices use ICE evaluated pricing as the underlying pricing source"}, {"anchor": "Secondary Whole Loan Platform", "rec": "ICE AVMs + Public Records", "type": "Trading \u2192 Due diligence", "rationale": "You're buying or selling whole loans. AVM + public records give you instant collateral due diligence on every loan in the trade tape without ordering full appraisals.", "segFit": "Asset Mgrs, HFs, Banks", "edge": "Property-level data mapped to loan IDs flowing through the trading platform"}, {"anchor": "ICE Portfolio Monitoring", "rec": "ICE Climate Risk for Mortgages", "type": "Monitoring + Risk layer", "rationale": "You're already watching for collateral events. Climate data adds a forward-looking layer \u2014 which loans are in wildfire/flood zones where insurance costs are spiking and proper
